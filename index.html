<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Yuhan Zhu's academic homepage: research, publications, experience, awards, and academic service.">
    <title>Yuhan Zhu - Homepage</title>
    <!-- Import Source Han Serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #f7f8f7;
            --color-surface: #ffffff;
            --color-surface-muted: #eef3f1;
            --color-text: #202624;
            --color-text-muted: #65716d;
            --color-border: rgba(32, 38, 36, 0.12);
            --color-accent: #2f6f64;
            --color-accent-hover: #19594f;
            --color-link: #176b78;
            --color-link-hover: #0f4f5a;
            --shadow-soft: 0 18px 45px rgba(34, 55, 49, 0.08);
        }

        body {
            font-family: 'Noto Serif SC', 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
            color: var(--color-text);
            background:
                radial-gradient(circle at top left, rgba(47, 111, 100, 0.08), transparent 32rem),
                linear-gradient(180deg, #fbfcfb 0, var(--color-bg) 22rem);
            font-size: 15.5px;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        ::selection {
            background: rgba(47, 111, 100, 0.18);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            margin-bottom: 0.5em;
            color: var(--color-text);
            letter-spacing: 0;
        }

        h1 { font-size: 2.35rem; }
        h2 { font-size: 1.35rem; margin-top: 1em; }
        h3 { font-size: 1.12rem; margin-top: 0.8em; }
        h4 { font-size: 1rem; }

        p {
            margin-bottom: 0.65em;
        }

        a {
            color: var(--color-link);
            text-decoration-thickness: 0.06em;
            text-underline-offset: 0.18em;
            transition: color 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
        }

        a:hover {
            color: var(--color-link-hover);
        }

        a:focus-visible {
            outline: 2px solid rgba(47, 111, 100, 0.45);
            outline-offset: 3px;
        }

        /* Layout */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            padding: 2.25rem 0 1.5rem;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 1.85rem;
        }

        .header-content {
            display: grid;
            grid-template-columns: 116px minmax(0, 1fr);
            align-items: center;
            gap: 1.15rem;
            text-align: left;
        }

        .profile-photo {
            width: 116px;
            height: 116px;
            border-radius: 18px;
            border: 1px solid rgba(32, 38, 36, 0.14);
            flex-shrink: 0;
            background-color: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: var(--color-text-muted);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .profile-info {
            display: grid;
            gap: 0.72rem;
            min-width: 0;
        }

        .identity-cluster {
            padding: 0.78rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 6px 20px rgba(32, 38, 36, 0.06);
        }

        .identity-cluster-main {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem 1.1rem;
            justify-content: space-between;
            width: 100%;
        }

        .identity-cluster .name {
            font-size: 1.86rem;
            margin: 0;
            font-weight: 500;
            color: var(--color-text);
            letter-spacing: 0;
            line-height: 1.16;
        }

        .identity-affiliation {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex: 1 1 18rem;
        }

        .name-english {
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .name-chinese {
            font-family: 'Noto Serif SC', '思源宋体', 'SimSun', '宋体', serif;
        }

        .name-divider {
            display: inline-block;
            width: 1px;
            height: 0.82em;
            margin: 0 0.5em;
            vertical-align: -0.06em;
            background: rgba(32, 38, 36, 0.18);
        }

        .affiliation-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.52em;
            max-width: 100%;
            padding: 0.42em 0.82em 0.42em 0.62em;
            border-radius: 999px;
            font-size: 0.96em;
            font-weight: 500;
            color: var(--color-accent-hover);
            background: var(--color-surface-muted);
            border: 1px solid rgba(47, 111, 100, 0.15);
        }

        .affiliation-symbol {
            flex-shrink: 0;
            color: var(--color-accent);
            opacity: 0.95;
        }

        .title-text {
            line-height: 1.35;
        }

        .name-native {
            display: none;
        }

        .contact-info {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            gap: 0.42rem;
            margin-bottom: 0;
            width: 100%;
        }

        .contact-email {
            margin-bottom: 0;
            flex: 0 1 auto;
            min-width: 0;
        }

        .email-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5em;
            max-width: 100%;
            min-width: 0;
            padding: 0.34em 0.7em 0.34em 0.56em;
            border-radius: 999px;
            text-decoration: none;
            color: var(--color-text);
            font-size: 0.88em;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            box-shadow: 0 1px 2px rgba(32, 38, 36, 0.04);
            white-space: nowrap;
        }

        .email-chip:hover {
            border-color: rgba(47, 111, 100, 0.32);
            background: #fbfdfc;
            color: var(--color-accent-hover);
        }

        .email-symbol {
            flex-shrink: 0;
            color: var(--color-accent);
            opacity: 0.92;
        }

        .email-value {
            font-family: inherit;
            font-size: 0.96em;
            font-weight: 500;
            word-break: normal;
            min-width: 0;
        }

        .social-links {
            display: flex;
            gap: 0.38rem;
            flex-wrap: nowrap;
            align-items: center;
            flex: 0 0 auto;
            margin-left: auto;
            min-width: 0;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 0.38em;
            min-width: 0;
            padding: 0.32em 0.62em 0.32em 0.48em;
            border-radius: 999px;
            text-decoration: none;
            color: var(--color-text);
            font-size: 0.85em;
            font-weight: 500;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            box-shadow: 0 1px 2px rgba(32, 38, 36, 0.04);
            white-space: nowrap;
        }

        .social-link:hover {
            border-color: rgba(47, 111, 100, 0.32);
            background: #fbfdfc;
            color: var(--color-accent-hover);
        }

        .social-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            border-radius: 4px;
            background-color: var(--color-surface-muted);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.5em;
        }

        /* Sections */
        section {
            margin-bottom: 2.05rem;
        }

        .section-title {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.6rem;
            margin: 0 0 0.72rem;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: uppercase;
            color: var(--color-accent-hover);
        }

        .section-title .title-aside {
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
            font-size: 0.68em;
            color: var(--color-text-muted);
        }

        .section-title .title-aside em {
            font-style: italic;
        }

        /* About section */
        .about-content {
            max-width: none;
            font-size: 1em;
            line-height: 1.6;
        }

        .about-content p:last-child {
            margin-bottom: 0;
        }

        .availability-note {
            color: #b42318;
            font-weight: 600;
        }

        /* News section - Slider style */
        .news-slider-container {
            position: relative;
            overflow: visible;
        }

        .news-slider {
            display: grid;
            max-height: none;
            overflow: visible;
            padding-right: 0;
        }

        .news-slider::-webkit-scrollbar {
            width: 0;
        }

        .news-slider::-webkit-scrollbar-track {
            background: var(--color-bg);
            border-radius: 3px;
        }

        .news-slider::-webkit-scrollbar-thumb {
            background: rgba(47, 111, 100, 0.35);
            border-radius: 3px;
        }

        .news-slider::-webkit-scrollbar-thumb:hover {
            background: rgba(47, 111, 100, 0.55);
        }

        .news-item {
            display: grid;
            grid-template-columns: 6rem minmax(0, 1fr);
            align-items: flex-start;
            gap: 0.9rem;
            padding: 0.2rem 0;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            position: relative;
        }

        .news-item + .news-item {
            margin-top: 0.28rem;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.48);
        }

        .news-date {
            font-weight: 600;
            color: var(--color-accent);
            font-size: 0.86em;
            min-width: 0;
            flex-shrink: 0;
            padding: 0.1rem 0 0;
            background: transparent;
            border: 0;
            border-radius: 0;
            text-align: left;
        }

        .news-content {
            font-size: 0.95em;
            line-height: 1.5;
            overflow-wrap: anywhere;
        }

        .news-content a {
            color: var(--color-link);
            font-weight: 600;
        }

        .news-content a:hover {
            color: var(--color-accent-hover);
            text-decoration: underline;
        }

        /* Publications */
        .pub-category {
            margin-bottom: 2em;
        }

        .pub-item {
            margin-bottom: 0;
            padding: 0.48rem 0;
            background-color: transparent;
            border-radius: 0;
        }

        .pub-item + .pub-item {
            margin-top: 0.18rem;
        }

        .pub-title {
            font-weight: 600;
            margin-bottom: 0.18em;
            color: var(--color-text);
            font-size: 1em;
            line-height: 1.4;
            overflow-wrap: anywhere;
        }

        .pub-authors {
            color: var(--color-text-muted);
            margin-bottom: 0.12em;
            font-size: 0.94em;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .pub-authors-details {
            margin-bottom: 0.12em;
            color: var(--color-text-muted);
            font-size: 0.94em;
            line-height: 1.45;
        }

        .pub-authors-details summary {
            display: inline-flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.45em;
            cursor: pointer;
            list-style: none;
        }

        .pub-authors-details summary::-webkit-details-marker {
            display: none;
        }

        .authors-toggle {
            color: var(--color-link);
            font-size: 0.9em;
            text-decoration: underline;
            text-decoration-thickness: 0.06em;
            text-underline-offset: 0.18em;
        }

        .pub-authors-full {
            margin-top: 0.12em;
        }

        .pub-venue {
            font-style: italic;
            color: var(--color-text);
            margin-bottom: 0.1em;
            font-size: 0.94em;
            line-height: 1.45;
        }

        .pub-links {
            margin-top: 0.12em;
        }

        .pub-links a {
            margin-right: 0.8em;
            color: var(--color-link);
            font-size: 0.92em;
            text-decoration: underline;
            text-decoration-thickness: 0.06em;
            text-underline-offset: 0.18em;
        }

        .pub-links a:hover {
            color: var(--color-accent-hover);
            text-decoration: underline;
        }

        .timeline-item {
            margin-bottom: 0.9rem;
            padding-left: 1.4rem;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 0.08em;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.62em;
            width: 8px;
            height: 8px;
            background-color: var(--color-accent);
            border-radius: 50%;
            box-shadow: 0 0 0 4px var(--color-bg);
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 1.25em;
            width: 1px;
            height: calc(100% + 1em);
            background-color: var(--color-border);
        }

        .timeline-item:last-child::after {
            display: none;
        }

        .timeline-title {
            font-weight: 600;
            margin: 0;
            overflow-wrap: anywhere;
        }

        .timeline-date {
            font-weight: 600;
            color: var(--color-text-muted);
            font-size: 0.88em;
            margin-left: 1em;
            white-space: nowrap;
        }

        .timeline-org-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .timeline-org {
            color: var(--color-text-muted);
            margin-bottom: 0.08em;
            line-height: 1.55;
            overflow-wrap: anywhere;
        }

        .timeline-org .organization-name {
            font-style: italic;
        }

        .timeline-org .location-name {
            font-style: normal;
            font-weight: 500;
            color: var(--color-text-muted);
            text-align: right;
        }

        .timeline-description {
            color: var(--color-text-muted);
            font-size: 0.95em;
            margin: 0;
        }

        /* Awards */
        .award-item {
            padding: 0.28rem 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            font-size: 0.92em;
        }

        .award-name {
            font-weight: 600;
            flex: 1;
            overflow-wrap: anywhere;
        }

        .award-date {
            color: var(--color-text-muted);
            font-size: 0.95em;
            margin-left: 1em;
            white-space: nowrap;
        }

        /* Talks & Service */
        .talk-item, .service-item {
            padding: 0.28rem 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            font-size: 0.92em;
        }

        .talk-title, .service-title {
            font-weight: 600;
            flex: 1;
            overflow-wrap: anywhere;
        }

        .talk-date, .service-date {
            color: var(--color-text-muted);
            font-size: 0.95em;
            margin-left: 1em;
            white-space: nowrap;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            header {
                padding: 1.75rem 0 1.25rem;
                margin-bottom: 1.55rem;
            }

            .header-content {
                grid-template-columns: 1fr;
                justify-items: center;
                text-align: center;
                gap: 0.85rem;
            }

            .profile-photo {
                width: 104px;
                height: 104px;
                border-radius: 17px;
                font-size: 2.5em;
            }

            .identity-cluster {
                text-align: center;
            }

            .identity-cluster-main {
                flex-direction: column;
                justify-items: center;
                gap: 0.65em;
            }

            .identity-affiliation {
                justify-content: center;
                width: 100%;
            }

            .name-divider {
                margin-left: 0.45em;
                margin-right: 0.45em;
            }

            .identity-cluster .name {
                font-size: 2rem;
            }

            .contact-info {
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }

            .contact-email {
                display: flex;
                justify-content: center;
                width: auto;
            }

            .social-links {
                flex: 1 1 auto;
                flex-wrap: wrap;
                justify-content: center;
                margin-left: 0;
            }

            .pub-item {
                padding: 0.55rem 0;
            }

            .timeline-item {
                padding-left: 1.45rem;
            }

            .timeline-header,
            .timeline-org-row,
            .award-item,
            .talk-item,
            .service-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.12rem;
            }

            .timeline-date,
            .award-date,
            .talk-date,
            .service-date {
                margin-left: 0;
                white-space: normal;
            }

            .timeline-org .location-name {
                text-align: left;
            }

            .news-item {
                grid-template-columns: 1fr;
                gap: 0.12rem;
                padding: 0.5rem 0;
            }

            .news-date {
                width: 100%;
                text-align: left;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }

            .identity-cluster .name {
                font-size: 1.72rem;
            }

            .name-divider {
                height: 0.72em;
                margin-left: 0.35em;
                margin-right: 0.35em;
            }

            .affiliation-chip,
            .email-chip,
            .social-link {
                max-width: 100%;
            }

            .email-value,
            .title-text {
                overflow-wrap: anywhere;
            }

            section {
                margin-bottom: 1.8rem;
            }
        }

        /* Footer */
        .footer {
            margin-top: 2.1rem;
            padding: 1.15rem 0 1.6rem;
            border-top: 1px solid var(--color-border);
            text-align: center;
            color: var(--color-text-muted);
            font-size: 0.88em;
            background-color: transparent;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.85rem;
        }

        .visitor-counter {
            font-weight: 500;
            color: var(--color-accent);
        }

        .copyright {
            color: var(--color-text-muted);
        }

        @media (max-width: 768px) {
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Loading animation */
        .is-ready {
            animation: fadeIn 0.35s ease-out both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

        // Function to format date safely across browsers
        function formatDate(dateString) {
            if (!dateString) {
                return '';
            }

            const trimmed = dateString.trim();

            // Match YYYY or YYYY-MM or YYYY-MM-DD
            const isoMatch = trimmed.match(/^(\d{4})(?:-(\d{2})(?:-(\d{2}))?)?$/);

            if (isoMatch) {
                const year = Number(isoMatch[1]);
                const month = isoMatch[2] ? Number(isoMatch[2]) : 1;
                const day = isoMatch[3] ? Number(isoMatch[3]) : 1;

                const date = new Date(year, month - 1, day);

                if (Number.isNaN(date.getTime())) {
                    return trimmed;
                }

                const options = isoMatch[3]
                    ? { year: 'numeric', month: '2-digit', day: '2-digit' }
                    : { year: 'numeric', month: '2-digit' };

                return date.toLocaleDateString('en-US', options);
            }

            const parsed = new Date(trimmed);
            if (Number.isNaN(parsed.getTime())) {
                return trimmed;
            }

            return parsed.toLocaleDateString('en-US', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }

        // Function to render publications

            const container = document.getElementById('publications-content');

            // Sort publications by the latest year mentioned in the venue text.
            const getPublicationYear = paper => {
                const years = paper.venue.match(/\b(19|20)\d{2}\b/g);
                return years ? Number(years[years.length - 1]) : 0;
            };
            const sortedPublications = [...siteData.publications].sort((a, b) => getPublicationYear(b) - getPublicationYear(a));

            const html = sortedPublications.map(paper => {
                // Make Yuhan Zhu bold in authors
                const highlightAuthor = authors => authors.replace(/Yuhan Zhu/g, '<strong>Yuhan Zhu</strong>');
                const authorsWithBold = highlightAuthor(paper.authors);
                const authorsHtml = paper.shortAuthors
                    ? `<details class="pub-authors-details">
                        <summary>
                            <span>${highlightAuthor(paper.shortAuthors)}</span>
                            <span class="authors-toggle">full authors</span>
                        </summary>
                        <div class="pub-authors-full">${authorsWithBold}</div>
                    </details>`
                    : `<div class="pub-authors">${authorsWithBold}</div>`;

                return `
                <div class="pub-item">
                    <div class="pub-title">${paper.title}</div>
                    ${authorsHtml}
                    <div class="pub-venue">${paper.venue}</div>
                    <div class="pub-links">
                        ${paper.links.pdf ? `<a href="${paper.links.pdf}" target="_blank" rel="noopener noreferrer">[pdf]</a>` : ''}
                        ${paper.links.code ? `<a href="${paper.links.code}" target="_blank" rel="noopener noreferrer">[code]</a>` : ''}
